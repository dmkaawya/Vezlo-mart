<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezlo Mart - Sri Lanka's Smartest Marketplace</title>
    <meta name="description" content="Sri Lanka's smartest marketplace! Retail deals with COD or join our Reseller Network.">
    <meta name="keywords" content="Reselling in Sri Lanka, Earn money online LK, Best online deals, Wholesale prices Sri Lanka, Cash on Delivery LK, Dropship LK, Vezlo Mart">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-vezlo-dark text-white font-inter">

    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 w-full z-50 glass transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center cursor-pointer" onclick="Router.navigate('home')">
                    <i class="fas fa-bolt text-vezlo-blue text-xl mr-2"></i>
                    <span class="text-xl font-extrabold tracking-tight">Vezlo<span class="text-vezlo-blue">Mart</span></span>
                </div>
                
                <div class="hidden md:flex items-center space-x-6">
                    <a onclick="Router.navigate('home')" class="nav-link active">Home</a>
                    <a onclick="Router.navigate('about')" class="nav-link">About</a>
                    <a onclick="Router.navigate('category')" class="nav-link">Categories</a>
                    <a onclick="Router.navigate('offers')" class="nav-link text-vezlo-red font-semibold">Offers</a>
                    <a onclick="Router.navigate('products')" class="nav-link">Products</a>
                    <a onclick="Router.navigate('contact')" class="nav-link">Contact</a>
                </div>

                <div class="flex items-center space-x-4">
                    <button class="relative p-2 hover:bg-white/10 rounded-full transition" onclick="Router.navigate('cart')">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count" class="absolute -top-1 -right-1 bg-vezlo-red text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span>
                    </button>
                    <button id="auth-btn" class="bg-vezlo-blue hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition" onclick="Router.navigate('login')">
                        Login
                    </button>
                    <button class="md:hidden p-2" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-700 pb-3">
            <a onclick="Router.navigate('home'); toggleMobileMenu()" class="block px-4 py-2 text-sm hover:bg-white/5">Home</a>
            <a onclick="Router.navigate('about'); toggleMobileMenu()" class="block px-4 py-2 text-sm hover:bg-white/5">About</a>
            <a onclick="Router.navigate('category'); toggleMobileMenu()" class="block px-4 py-2 text-sm hover:bg-white/5">Categories</a>
            <a onclick="Router.navigate('offers'); toggleMobileMenu()" class="block px-4 py-2 text-sm hover:bg-white/5 text-vezlo-red">Offers</a>
            <a onclick="Router.navigate('products'); toggleMobileMenu()" class="block px-4 py-2 text-sm hover:bg-white/5">Products</a>
            <a onclick="Router.navigate('contact'); toggleMobileMenu()" class="block px-4 py-2 text-sm hover:bg-white/5">Contact</a>
        </div>
    </nav>

    <!-- Dynamic Page Container -->
    <main id="app" class="pt-16 min-h-screen"></main>

    <!-- Toast Notification -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[9999] flex flex-col gap-2"></div>

    <script src="app.js"></script>
</body>
</html>
