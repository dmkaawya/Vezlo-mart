<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezlo Mart - Sri Lanka's Smartest Marketplace</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Sri Lanka's smartest marketplace! Get the best retail deals with Cash on Delivery, or join our exclusive Reseller Network to start your own business and earn from home.">
    <meta name="keywords" content="Reselling in Sri Lanka, Earn money online LK, Best online deals, Wholesale prices Sri Lanka, Cash on Delivery LK, Dropship LK, Tech Gadgets, Men's Clothing">
    <meta name="author" content="Vezlo Mart">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Vezlo Mart - Sri Lanka's Smartest Marketplace">
    <meta property="og:description" content="Get the best retail deals with COD or join our Reseller Network to earn from home!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vezlomart.lk">

    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        vezlo: { blue: '#2563EB', red: '#DC2626', dark: '#0f172a', card: '#1e293b', border: '#334155' }
                    },
                    fontFamily: { inter: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .light .glass { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2563EB; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-vezlo-dark text-white font-inter transition-colors duration-300">

    <!-- Loading State -->
    <div id="loading-screen" class="fixed inset-0 bg-vezlo-dark z-[9999] flex items-center justify-center">
        <i class="fas fa-bolt text-vezlo-blue text-4xl animate-pulse"></i>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed top-20 right-4 z-[9998] flex flex-col gap-2"></div>

    <!-- Main App Container -->
    <div id="app" class="min-h-screen"></div>

    <script>
        // ==========================================
        // VEZLO MART - CORE APPLICATION
        // ==========================================
        
        const Vezlo = {
            // --- CONFIGURATION ---
            SUPABASE_URL: 'YOUR_SUPABASE_URL_HERE', // Replace this
            SUPABASE_KEY: 'YOUR_SUPABASE_ANON_KEY_HERE', // Replace this
            
            WHATSAPP: '94775048455',
            EMAIL: 'chat.dmkaawya@gmail.com',
            PHONE: '0775048455',
            DELIVERY_FEE: 250,
            RESELLER_DISCOUNT: 25, // 25%
            
            // --- STATE ---
            user: null,
            profile: null,
            cart: [],
            products: [],
            currentView: 'home',
            isDark: true,

            supabase: null,

            // --- INITIALIZE ---
            async init() {
                this.supabase = supabase.createClient(this.SUPABASE_URL, this.SUPABASE_KEY);
                
                // Check Auth
                const { data: { session } } = await this.supabase.auth.getSession();
                if (session) {
                    this.user = session.user;
                    await this.loadProfile();
                }

                this.supabase.auth.onAuthStateChange(async (event, session) => {
                    if (session) {
                        this.user = session.user;
                        await this.loadProfile();
                    } else {
                        this.user = null;
                        this.profile = null;
                    }
                    this.render();
                });

                await this.loadProducts();
                
                document.getElementById('loading-screen').style.display = 'none';
                this.render();
            },

            // --- DATA LOADERS ---
            async loadProfile() {
                if (!this.user) return;
                const { data, error } = await this.supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', this.user.id)
                    .single();
                if (data) this.profile = data;
            },

            async loadProducts() {
                const { data, error } = await this.supabase.from('products').select('*');
                if (data) this.products = data;
                else {
                    // Demo data if DB is empty
                    this.products = [
                        { id: '1', name: 'Wireless Earbuds Pro', description: 'Premium sound quality', price: 4990, reseller_price: 3740, category: 'Tech Gadgets', image_url: 'https://picsum.photos/seed/earbuds/400/400', stock: 45 },
                        { id: '2', name: 'Smart Fitness Watch', description: 'Heart rate monitor, IP68', price: 8990, reseller_price: 6740, category: 'Tech Gadgets', image_url: 'https://picsum.photos/seed/watch/400/400', stock: 30 },
                        { id: '3', name: 'Cotton Slim Fit Shirt', description: '100% premium cotton', price: 2490, reseller_price: 1870, category: "Men's Clothing", image_url: 'https://picsum.photos/seed/shirt/400/400', stock: 100 },
                        { id: '4', name: 'RGB Gaming Keyboard', description: 'Mechanical switches', price: 7490, reseller_price: 5620, category: 'Tech Gadgets', image_url: 'https://picsum.photos/seed/keyboard/400/400', stock: 20 },
                    ];
                }
            },

            // --- HELPERS ---
            isReseller() { return this.profile?.role === 'reseller' && this.profile?.reseller_approved; },
            isStaff() { return ['staff', 'manager', 'owner'].includes(this.profile?.role); },
            isOwner() { return this.profile?.role === 'owner'; },
            
            getPrice(product) {
                return this.isReseller() ? product.reseller_price : product.price;
            },

            generateWhatsAppLink(items, total) {
                let msg = `Hi Vezlo Mart! I'd like to order:\n\n`;
                items.forEach(item => {
                    msg += `*${item.name}* x${item.qty} - Rs. ${this.getPrice(item) * item.qty}\n`;
                });
                msg += `\nDelivery: Rs. ${this.DELIVERY_FEE}\nTotal: Rs. ${total + this.DELIVERY_FEE}`;
                if (this.profile) msg += `\n\nName: ${this.profile.name}\nPhone: ${this.profile.phone}\nAddress: ${this.profile.address}`;
                return `https://wa.me/${this.WHATSAPP}?text=${encodeURIComponent(msg)}`;
            },

            // --- AUTH ---
            async login(email, password) {
                const { error } = await this.supabase.auth.signInWithPassword({ email, password });
                if (error) this.toast(error.message, 'error');
                else { this.toast('Login Successful!', 'success'); this.navigate('dashboard'); }
            },

            async register(email, password, name, phone, role = 'customer') {
                const { data, error } = await this.supabase.auth.signUp({ 
                    email, password, 
                    options: { data: { name } } 
                });
                if (error) { this.toast(error.message, 'error'); return; }
                
                // Update profile with phone and role
                if (data.user) {
                    await this.supabase.from('profiles').update({ 
                        phone, role, name 
                    }).eq('id', data.user.id);
                }
                this.toast('Registration Successful! Please check email to verify.', 'success');
                this.navigate('auth');
            },

            async logout() {
                await this.supabase.auth.signOut();
                this.cart = [];
                this.navigate('home');
                this.toast('Logged out', 'info');
            },

            // --- CART & ORDERS ---
            addToCart(product) {
                const existing = this.cart.find(i => i.id === product.id);
                if (existing) existing.qty++;
                else this.cart.push({ ...product, qty: 1 });
                this.toast(`${product.name} added to cart!`, 'success');
                this.render();
            },

            async placeOrder(address, paymentMethod) {
                if (!this.profile) return this.navigate('auth');
                const total = this.cart.reduce((sum, item) => sum + (this.getPrice(item) * item.qty), 0);
                
                const { data: order, error } = await this.supabase.from('orders').insert({
                    user_id: this.user.id, total, delivery_cost: this.DELIVERY_FEE, 
                    payment_method: paymentMethod, address, status: 'processing'
                }).select().single();

                if (order) {
                    const orderItems = this.cart.map(item => ({
                        order_id: order.id, product_id: item.id, 
                        quantity: item.qty, price: this.getPrice(item)
                    }));
                    await this.supabase.from('order_items').insert(orderItems);
                    
                    // Add points
                    await this.supabase.from('profiles').update({ 
                        points: this.profile.points + 10 
                    }).eq('id', this.user.id);

                    this.cart = [];
                    this.toast('Order placed successfully!', 'success');
                    this.navigate('dashboard');
                } else {
                    this.toast('Order failed. Try WhatsApp instead.', 'error');
                }
            },

            // --- UI FUNCTIONS ---
            toast(message, type = 'info') {
                const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-vezlo-blue' };
                const div = document.createElement('div');
                div.className = `${colors[type]} text-white px-4 py-2 rounded-lg shadow-lg fade-in text-sm font-medium`;
                div.textContent = message;
                document.getElementById('toast-container').appendChild(div);
                setTimeout(() => div.remove(), 3000);
            },

            toggleTheme() {
                this.isDark = !this.isDark;
                document.documentElement.classList.toggle('dark', this.isDark);
                document.body.classList.toggle('bg-vezlo-dark', this.isDark);
                document.body.classList.toggle('text-white', this.isDark);
                document.body.classList.toggle('bg-gray-100', !this.isDark);
                document.body.classList.toggle('text-gray-900', !this.isDark);
                document.body.classList.toggle('light', !this.isDark);
                this.render();
            },

            navigate(view) {
                this.currentView = view;
                this.render();
                window.scrollTo(0, 0);
            },

            // --- RENDER ENGINE ---
            render() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    ${this.renderNav()}
                    <main class="pt-16 min-h-screen">
                        ${this.renderCurrentView()}
                    </main>
                `;
            },

            renderNav() {
                const cartCount = this.cart.reduce((sum, i) => sum + i.qty, 0);
                return `
                <nav class="fixed top-0 left-0 right-0 z-50 glass h-16 flex items-center px-4 md:px-8 justify-between">
                    <div class="flex items-center gap-2 cursor-pointer" onclick="Vezlo.navigate('home')">
                        <i class="fas fa-bolt text-vezlo-blue text-xl"></i>
                        <span class="text-xl font-extrabold tracking-tight">Vezlo<span class="text-vezlo-blue">Mart</span></span>
                    </div>
                    
                    <div class="hidden md:flex items-center gap-6">
                        <button onclick="Vezlo.navigate('home')" class="text-sm font-medium hover:text-vezlo-blue transition">Home</button>
                        <button onclick="Vezlo.navigate('products')" class="text-sm font-medium hover:text-vezlo-blue transition">Products</button>
                        ${this.profile ? `<button onclick="Vezlo.navigate('dashboard')" class="text-sm font-medium hover:text-vezlo-blue transition">Dashboard</button>` : ''}
                    </div>

                    <div class="flex items-center gap-4">
                        <button onclick="Vezlo.toggleTheme()" class="p-2 rounded-full hover:bg-white/10 transition">
                            <i class="fas fa-${this.isDark ? 'sun' : 'moon'}"></i>
                        </button>
                        <button onclick="Vezlo.navigate('cart')" class="relative p-2 hover:bg-white/10 rounded-full transition">
                            <i class="fas fa-shopping-cart"></i>
                            ${cartCount > 0 ? `<span class="absolute -top-1 -right-1 bg-vezlo-red text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">${cartCount}</span>` : ''}
                        </button>
                        ${this.profile ? `
                            <div class="hidden md:flex items-center gap-2 cursor-pointer hover:bg-white/10 p-2 rounded-lg transition" onclick="Vezlo.navigate('dashboard')">
                                <div class="w-7 h-7 rounded-full bg-vezlo-blue flex items-center justify-center text-xs font-bold">${this.profile.name?.[0] || 'U'}</div>
                                <span class="text-sm font-medium">${this.profile.name?.split(' ')[0] || 'User'}</span>
                            </div>
                        ` : `
                            <button onclick="Vezlo.navigate('auth')" class="bg-vezlo-blue hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">Login</button>
                        `}
                    </div>
                </nav>`;
            },

            renderCurrentView() {
                switch(this.currentView) {
                    case 'home': return this.viewHome();
                    case 'products': return this.viewProducts();
                    case 'cart': return this.viewCart();
                    case 'checkout': return this.viewCheckout();
                    case 'auth': return this.viewAuth();
                    case 'dashboard': return this.viewDashboard();
                    default: return this.viewHome();
                }
            },

            // --- VIEWS ---
            viewHome() {
                return `
                <div class="relative overflow-hidden bg-gradient-to-br from-vezlo-dark via-blue-900/20 to-vezlo-dark py-20 md:py-32 px-4">
                    <div class="max-w-6xl mx-auto text-center">
                        <div class="inline-block px-3 py-1 mb-6 rounded-full border border-vezlo-blue/30 text-vezlo-blue text-xs font-semibold tracking-wider">
                            SRI LANKA'S SMARTEST MARKETPLACE
                        </div>
                        <h1 class="text-4xl md:text-6xl font-black mb-6 leading-tight">Shop Smart. <br class="md:hidden">Earn <span class="text-vezlo-blue">More.</span></h1>
                        <p class="text-gray-400 max-w-xl mx-auto mb-8 text-lg">Get the best retail deals with Cash on Delivery, or join our exclusive Reseller Network to start your own business and earn from home.</p>
                        <div class="flex flex-col sm:flex-row gap-4 justify-center">
                            <button onclick="Vezlo.navigate('products')" class="bg-vezlo-blue hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl transition flex items-center justify-center gap-2">
                                <i class="fas fa-shopping-bag"></i> Shop Now
                            </button>
                            <button onclick="Vezlo.navigate('auth')" class="border border-gray-600 hover:border-vezlo-blue text-white font-bold px-8 py-3 rounded-xl transition flex items-center justify-center gap-2">
                                <i class="fas fa-hand-holding-usd"></i> Become a Reseller
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Featured Products -->
                <div class="max-w-7xl mx-auto px-4 py-16">
                    <h2 class="text-2xl font-bold mb-8">Featured Products</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                        ${this.products.map(p => this.productCard(p)).join('')}
                    </div>
                </div>

                <!-- Footer -->
                <footer class="border-t border-gray-800 py-12 px-4 mt-8">
                    <div class="max-w-6xl mx-auto grid md:grid-cols-4 gap-8">
                        <div>
                            <div class="flex items-center gap-2 mb-4"><i class="fas fa-bolt text-vezlo-blue"></i><span class="font-extrabold text-lg">VezloMart</span></div>
                            <p class="text-sm text-gray-400">Sri Lanka's smartest marketplace.</p>
                            <div class="flex gap-4 mt-4">
                                <a href="#" class="text-gray-400 hover:text-vezlo-blue"><i class="fab fa-facebook"></i></a>
                                <a href="#" class="text-gray-400 hover:text-vezlo-blue"><i class="fab fa-instagram"></i></a>
                                <a href="https://wa.me/${this.WHATSAPP}" class="text-gray-400 hover:text-green-500"><i class="fab fa-whatsapp"></i></a>
                            </div>
                        </div>
                        <div>
                            <h4 class="font-semibold mb-3">Contact</h4>
                            <p class="text-sm text-gray-400"><i class="fas fa-envelope mr-2"></i>${this.EMAIL}</p>
                            <p class="text-sm text-gray-400 mt-1"><i class="fas fa-phone mr-2"></i>${this.PHONE}</p>
                        </div>
                        <div>
                            <h4 class="font-semibold mb-3">Quick Links</h4>
                            <p class="text-sm text-gray-400 cursor-pointer hover:text-white" onclick="Vezlo.navigate('products')">Products</p>
                            <p class="text-sm text-gray-400 cursor-pointer hover:text-white" onclick="Vezlo.navigate('auth')">Login / Register</p>
                        </div>
                        <div>
                            <h4 class="font-semibold mb-3">Policies</h4>
                            <p class="text-sm text-gray-400">Return Policy</p>
                            <p class="text-sm text-gray-400">Privacy Policy</p>
                        </div>
                    </div>
                </footer>`;
            },

            viewProducts() {
                return `
                <div class="max-w-7xl mx-auto px-4 py-8">
                    <div class="flex justify-between items-center mb-8">
                        <h1 class="text-2xl font-bold">All Products</h1>
                        ${this.isReseller() ? '<span class="bg-green-500/20 text-green-400 text-xs font-semibold px-3 py-1 rounded-full"><i class="fas fa-tag mr-1"></i> Reseller Prices Active</span>' : ''}
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                        ${this.products.map(p => this.productCard(p)).join('')}
                    </div>
                </div>`;
            },

            productCard(p) {
                const price = this.getPrice(p);
                const isRes = this.isReseller();
                return `
                <div class="bg-vezlo-card border border-vezlo-border rounded-xl overflow-hidden hover:border-vezlo-blue transition-all duration-300 group cursor-pointer" onclick="Vezlo.addToCart(Vezlo.products.find(x=>x.id==='${p.id}'))">
                    <div class="relative overflow-hidden">
                        <img src="${p.image_url}" class="w-full h-40 md:h-52 object-cover group-hover:scale-105 transition-transform duration-300" alt="${p.name}">
                        ${isRes ? `<span class="absolute top-2 left-2 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded">${this.RESELLER_DISCOUNT}% OFF</span>` : ''}
                    </div>
                    <div class="p-3 md:p-4">
                        <p class="text-[10px] text-gray-500 uppercase font-semibold">${p.category}</p>
                        <h3 class="font-semibold text-sm mt-1 truncate">${p.name}</h3>
                        <div class="mt-2 flex items-baseline gap-2">
                            <span class="text-lg font-bold ${isRes ? 'text-green-400' : 'text-vezlo-blue'}">Rs. ${price.toLocaleString()}</span>
                            ${isRes ? `<span class="text-xs text-gray-500 line-through">Rs. ${p.price.toLocaleString()}</span>` : ''}
                        </div>
                        <button class="w-full mt-3 bg-vezlo-blue/10 hover:bg-vezlo-blue text-vezlo-blue hover:text-white text-xs font-semibold py-2 rounded-lg transition">
                            <i class="fas fa-cart-plus mr-1"></i> Add to Cart
                        </button>
                    </div>
                </div>`;
            },

            viewCart() {
                const subtotal = this.cart.reduce((sum, item) => sum + (this.getPrice(item) * item.qty), 0);
                const total = subtotal + (this.cart.length > 0 ? this.DELIVERY_FEE : 0);
                const waLink = this.generateWhatsAppLink(this.cart, subtotal);

                if (this.cart.length === 0) {
                    return `<div class="max-w-xl mx-auto text-center py-20 px-4"><i class="fas fa-shopping-cart text-6xl text-gray-700 mb-6"></i><h2 class="text-2xl font-bold mb-4">Cart is Empty</h2><button onclick="Vezlo.navigate('products')" class="bg-vezlo-blue text-white px-6 py-2 rounded-lg font-semibold">Shop Now</button></div>`;
                }

                return `
                <div class="max-w-4xl mx-auto px-4 py-8">
                    <h1 class="text-2xl font-bold mb-8">Shopping Cart</h1>
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="md:col-span-2 space-y-4">
                            ${this.cart.map((item, i) => `
                                <div class="flex gap-4 bg-vezlo-card p-4 rounded-xl border border-vezlo-border">
                                    <img src="${item.image_url}" class="w-20 h-20 object-cover rounded-lg">
                                    <div class="flex-1">
                                        <h3 class="font-semibold">${item.name}</h3>
                                        <p class="text-vezlo-blue font-bold mt-1">Rs. ${this.getPrice(item).toLocaleString()}</p>
                                        <div class="flex items-center gap-2 mt-2">
                                            <button onclick="Vezlo.cart[${i}].qty--; if(Vezlo.cart[${i}].qty<=0) Vezlo.cart.splice(${i},1); Vezlo.render()" class="w-7 h-7 bg-gray-700 rounded text-sm hover:bg-gray-600">-</button>
                                            <span class="font-semibold">${item.qty}</span>
                                            <button onclick="Vezlo.cart[${i}].qty++; Vezlo.render()" class="w-7 h-7 bg-gray-700 rounded text-sm hover:bg-gray-600">+</button>
                                        </div>
                                    </div>
                                    <button onclick="Vezlo.cart.splice(${i},1); Vezlo.render()" class="text-gray-500 hover:text-red-500 h-fit"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="bg-vezlo-card p-6 rounded-xl border border-vezlo-border h-fit">
                            <h3 class="font-bold text-lg mb-4">Order Summary</h3>
                            <div class="space-y-2 text-sm text-gray-400">
                                <div class="flex justify-between"><span>Subtotal</span><span>Rs. ${subtotal.toLocaleString()}</span></div>
                                <div class="flex justify-between"><span>Delivery</span><span>Rs. ${this.DELIVERY_FEE}</span></div>
                                ${this.isReseller() ? `<div class="flex justify-between text-green-400"><span>Reseller Savings</span><span>- Rs. ${this.cart.reduce((s,i)=>s+((i.price-i.reseller_price)*i.qty),0).toLocaleString()}</span></div>` : ''}
                            </div>
                            <div class="border-t border-gray-700 mt-4 pt-4 flex justify-between font-bold text-lg">
                                <span>Total</span><span class="text-vezlo-blue">Rs. ${total.toLocaleString()}</span>
                            </div>
                            
                            ${this.profile ? `
                            <button onclick="Vezlo.navigate('checkout')" class="w-full mt-6 bg-vezlo-blue hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">
                                <i class="fas fa-credit-card mr-2"></i> Checkout
                            </button>` : `
                            <button onclick="Vezlo.navigate('auth')" class="w-full mt-6 bg-vezlo-blue hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">
                                Login to Checkout
                            </button>`}
                            
                            <a href="${waLink}" target="_blank" class="w-full mt-3 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
                                <i class="fab fa-whatsapp"></i> Order via WhatsApp
                            </a>
                        </div>
                    </div>
                </div>`;
            },

            viewCheckout() {
                if (!this.profile) return this.viewAuth();
                const subtotal = this.cart.reduce((sum, item) => sum + (this.getPrice(item) * item.qty), 0);
                const total = subtotal + this.DELIVERY_FEE;

                return `
                <div class="max-w-xl mx-auto px-4 py-8">
                    <h1 class="text-2xl font-bold mb-6">Checkout</h1>
                    <div class="bg-vezlo-card p-6 rounded-xl border border-vezlo-border">
                        <div class="mb-4">
                            <label class="text-sm text-gray-400 block mb-1">Delivery Address</label>
                            <textarea id="chk-address" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white focus:border-vezlo-blue outline-none" rows="3">${this.profile.address || ''}</textarea>
                        </div>
                        <div class="mb-6">
                            <label class="text-sm text-gray-400 block mb-2">Payment Method</label>
                            <div class="grid grid-cols-2 gap-3">
                                <label class="border-2 border-vezlo-blue rounded-lg p-3 text-center cursor-pointer bg-vezlo-blue/10">
                                    <input type="radio" name="payment" value="COD" checked class="hidden">
                                    <i class="fas fa-money-bill-wave text-vezlo-blue text-xl mb-1"></i><br>
                                    <span class="text-xs font-semibold">Cash on Delivery</span>
                                </label>
                                <label class="border-2 border-gray-700 rounded-lg p-3 text-center cursor-pointer hover:border-gray-500">
                                    <input type="radio" name="payment" value="Bank Transfer" class="hidden">
                                    <i class="fas fa-university text-gray-400 text-xl mb-1"></i><br>
                                    <span class="text-xs font-semibold">Bank Transfer</span>
                                </label>
                            </div>
                        </div>
                        <div class="flex justify-between font-bold text-lg mb-6">
                            <span>Total</span><span class="text-vezlo-blue">Rs. ${total.toLocaleString()}</span>
                        </div>
                        <button onclick="Vezlo.placeOrder(document.getElementById('chk-address').value, document.querySelector('input[name=payment]:checked').value)" class="w-full bg-vezlo-blue hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">
                            Place Order
                        </button>
                    </div>
                </div>`;
            },

            viewAuth() {
                return `
                <div class="max-w-md mx-auto px-4 py-16">
                    <div class="text-center mb-8">
                        <i class="fas fa-bolt text-vezlo-blue text-3xl mb-2"></i>
                        <h1 class="text-2xl font-bold">Welcome to VezloMart</h1>
                    </div>
                    
                    <!-- Login Form -->
                    <div class="bg-vezlo-card p-6 rounded-xl border border-vezlo-border mb-4">
                        <h2 class="font-bold text-lg mb-4">Login</h2>
                        <input type="email" id="login-email" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 mb-3 text-white focus:border-vezlo-blue outline-none">
                        <input type="password" id="login-pass" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 mb-4 text-white focus:border-vezlo-blue outline-none">
                        <button onclick="Vezlo.login(document.getElementById('login-email').value, document.getElementById('login-pass').value)" class="w-full bg-vezlo-blue hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Login</button>
                    </div>

                    <!-- Register Form -->
                    <div class="bg-vezlo-card p-6 rounded-xl border border-vezlo-border">
                        <h2 class="font-bold text-lg mb-4">Register</h2>
                        <input type="text" id="reg-name" placeholder="Full Name" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 mb-3 text-white focus:border-vezlo-blue outline-none">
                        <input type="email" id="reg-email" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 mb-3 text-white focus:border-vezlo-blue outline-none">
                        <input type="tel" id="reg-phone" placeholder="WhatsApp Number" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 mb-3 text-white focus:border-vezlo-blue outline-none">
                        <input type="password" id="reg-pass" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 mb-4 text-white focus:border-vezlo-blue outline-none">
                        
                        <div class="flex gap-3 mb-4">
                            <label class="flex-1 border border-gray-700 rounded-lg p-2 text-center cursor-pointer hover:border-vezlo-blue text-sm">
                                <input type="radio" name="role" value="customer" checked class="hidden"> Customer
                            </label>
                            <label class="flex-1 border border-vezlo-blue rounded-lg p-2 text-center cursor-pointer bg-vezlo-blue/10 text-sm text-vezlo-blue font-semibold">
                                <input type="radio" name="role" value="reseller" class="hidden"> Reseller
                            </label>
                        </div>

                        <button onclick="Vezlo.register(document.getElementById('reg-email').value, document.getElementById('reg-pass').value, document.getElementById('reg-name').value, document.getElementById('reg-phone').value, document.querySelector('input[name=role]:checked').value)" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">Create Account</button>
                    </div>
                </div>`;
            },

            // --- DASHBOARD ---
            viewDashboard() {
                if (!this.profile) return this.viewAuth();
                const role = this.profile.role;
                
                let content = '';
                if (role === 'customer') content = this.dashCustomer();
                else if (role === 'reseller' && this.profile.reseller_approved) content = this.dashReseller();
                else if (role === 'reseller' && !this.profile.reseller_approved) content = this.dashPending();
                else if (['staff', 'manager', 'owner'].includes(role)) content = this.dashAdmin();

                return `
                <div class="flex min-h-screen pt-16">
                    ${this.dashSidebar()}
                    <div class="flex-1 p-6 md:p-8 overflow-y-auto">
                        ${content}
                    </div>
                </div>`;
            },

            dashSidebar() {
                const role = this.profile.role;
                const items = {
                    customer: [
                        { icon: 'fa-tachometer-alt', label: 'Overview', id: 'overview' },
                        { icon: 'fa-shopping-bag', label: 'My Orders', id: 'orders' },
                    ],
                    reseller: [
                        { icon: 'fa-tachometer-alt', label: 'Overview', id: 'overview' },
                        { icon: 'fa-shopping-bag', label: 'My Orders', id: 'orders' },
                        { icon: 'fa-users', label: 'My Customers', id: 'customers' },
                    ],
                    staff: [
                        { icon: 'fa-box', label: 'Products', id: 'products' },
                        { icon: 'fa-shopping-bag', label: 'Orders', id: 'orders' },
                        { icon: 'fa-user-check', label: 'Approve Resellers', id: 'resellers' },
                        { icon: 'fa-star', label: 'Reviews', id: 'reviews' },
                    ],
                    manager: [
                        { icon: 'fa-chart-line', label: 'Analytics', id: 'analytics' },
                        { icon: 'fa-box', label: 'Products', id: 'products' },
                        { icon: 'fa-shopping-bag', label: 'Orders', id: 'orders' },
                        { icon: 'fa-user-check', label: 'Resellers', id: 'resellers' },
                        { icon: 'fa-user-tie', label: 'Staff', id: 'staff' },
                    ],
                    owner: [
                        { icon: 'fa-chart-line', label: 'Analytics', id: 'analytics' },
                        { icon: 'fa-box', label: 'Products', id: 'products' },
                        { icon: 'fa-user-check', label: 'Resellers', id: 'resellers' },
                        { icon: 'fa-user-tie', label: 'Staff', id: 'staff' },
                        { icon: 'fa-cog', label: 'Settings', id: 'settings' },
                    ]
                };

                return `
                <div class="hidden md:flex w-64 bg-vezlo-card border-r border-vezlo-border flex-col pt-4 h-[calc(100vh-64px)] sticky top-16">
                    <div class="px-4 mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-vezlo-blue flex items-center justify-center font-bold">${this.profile.name?.[0] || 'U'}</div>
                            <div>
                                <div class="font-semibold text-sm">${this.profile.name}</div>
                                <div class="text-[10px] uppercase tracking-wider text-vezlo-blue font-bold">${role}</div>
                            </div>
                        </div>
                    </div>
                    <nav class="flex-1 px-2 space-y-1">
                        ${(items[role] || []).map(item => `
                            <button onclick="document.getElementById('dash-content').innerHTML = Vezlo.dashSection('${item.id}')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-white/5 hover:text-white transition">
                                <i class="fas ${item.icon} w-5"></i> ${item.label}
                            </button>
                        `).join('')}
                    </nav>
                    <div class="p-4 border-t border-vezlo-border">
                        <button onclick="Vezlo.logout()" class="w-full flex items-center gap-2 text-red-400 text-sm hover:text-red-300"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>`;
            },

            dashSection(id) {
                // Dynamic section loader for dashboard
                switch(id) {
                    case 'overview': return this.profile.role === 'reseller' ? this.dashReseller() : this.dashCustomer();
                    case 'orders': return this.dashOrders();
                    case 'products': return this.dashProducts();
                    case 'resellers': return this.dashManageResellers();
                    case 'settings': return this.dashOwnerSettings();
                    default: return '<p class="text-gray-500">Section coming soon...</p>';
                }
            },

            dashCustomer() {
                return `
                <h1 class="text-2xl font-bold mb-6">Customer Dashboard</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-sm text-gray-400 mb-1">Loyalty Points</div>
                        <div class="text-2xl font-bold text-yellow-400"><i class="fas fa-coins mr-2"></i>${this.profile.points || 0}</div>
                    </div>
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-sm text-gray-400 mb-1">Total Orders</div>
                        <div class="text-2xl font-bold">0</div>
                    </div>
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-sm text-gray-400 mb-1">Total Savings</div>
                        <div class="text-2xl font-bold text-green-400">Rs. 0</div>
                    </div>
                </div>
                <div class="bg-vezlo-card border border-vezlo-border p-6 rounded-xl">
                    <h3 class="font-bold mb-4">Recent Orders</h3>
                    <p class="text-gray-500 text-sm">Your order history will appear here.</p>
                </div>`;
            },

            dashPending() {
                return `
                <div class="max-w-md mx-auto text-center py-16">
                    <i class="fas fa-hourglass-half text-yellow-400 text-5xl mb-6"></i>
                    <h1 class="text-2xl font-bold mb-4">Approval Pending</h1>
                    <p class="text-gray-400 mb-6">Your reseller application is being reviewed. You can shop as a customer in the meantime.</p>
                    <button onclick="Vezlo.navigate('products')" class="bg-vezlo-blue text-white px-6 py-2 rounded-lg font-semibold">Browse Products</button>
                </div>`;
            },

            dashReseller() {
                return `
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold">Reseller Dashboard</h1>
                    <span class="bg-green-500/20 text-green-400 text-xs font-bold px-3 py-1 rounded-full">APPROVED</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-xs text-gray-400 mb-1">Total Earnings</div>
                        <div class="text-xl font-bold text-green-400">Rs. 0</div>
                    </div>
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-xs text-gray-400 mb-1">Total Orders</div>
                        <div class="text-xl font-bold">0</div>
                    </div>
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-xs text-gray-400 mb-1">Delivery Costs</div>
                        <div class="text-xl font-bold text-yellow-400">Rs. 0</div>
                    </div>
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-xs text-gray-400 mb-1">Rank</div>
                        <div class="text-xl font-bold text-vezlo-blue">#-</div>
                    </div>
                </div>
                <div class="bg-vezlo-card border border-vezlo-border p-6 rounded-xl">
                    <h3 class="font-bold mb-4">Reseller Tools</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <button onclick="Vezlo.navigate('products')" class="border border-vezlo-blue text-vezlo-blue p-4 rounded-xl hover:bg-vezlo-blue/10 transition text-left">
                            <i class="fas fa-shopping-bag text-xl mb-2"></i><br>
                            <span class="font-bold">Order Products</span><br>
                            <span class="text-xs text-gray-400">Browse with discounted prices</span>
                        </button>
                        <a href="${this.generateWhatsAppLink([{name:'Custom Order', qty:1, price:0}], 0)}" target="_blank" class="border border-green-500 text-green-500 p-4 rounded-xl hover:bg-green-500/10 transition text-left">
                            <i class="fab fa-whatsapp text-xl mb-2"></i><br>
                            <span class="font-bold">WhatsApp Order</span><br>
                            <span class="text-xs text-gray-400">Quick order via WhatsApp</span>
                        </a>
                    </div>
                </div>`;
            },

            dashAdmin() {
                return `
                <h1 class="text-2xl font-bold mb-6">Admin Dashboard</h1>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-xs text-gray-400 mb-1">Revenue</div>
                        <div class="text-xl font-bold text-green-400">Rs. 0</div>
                    </div>
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-xs text-gray-400 mb-1">Orders</div>
                        <div class="text-xl font-bold">0</div>
                    </div>
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-xs text-gray-400 mb-1">Products</div>
                        <div class="text-xl font-bold">${this.products.length}</div>
                    </div>
                    <div class="bg-vezlo-card border border-vezlo-border p-4 rounded-xl">
                        <div class="text-xs text-gray-400 mb-1">Resellers</div>
                        <div class="text-xl font-bold text-yellow-400">0</div>
                    </div>
                </div>
                <div id="dash-content" class="bg-vezlo-card border border-vezlo-border p-6 rounded-xl">
                    ${this.dashProducts()}
                </div>`;
            },

            dashProducts() {
                return `
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold">Manage Products</h3>
                    <button class="bg-vezlo-blue text-white text-sm px-4 py-2 rounded-lg font-semibold"><i class="fas fa-plus mr-1"></i> Add Product</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="text-xs text-gray-400 uppercase border-b border-gray-700">
                            <tr><th class="p-2">Product</th><th class="p-2">Price</th><th class="p-2">Reseller Price</th><th class="p-2">Stock</th><th class="p-2">Actions</th></tr>
                        </thead>
                        <tbody>
                            ${this.products.map(p => `
                                <tr class="border-b border-gray-800 hover:bg-white/5">
                                    <td class="p-2 font-medium">${p.name}</td>
                                    <td class="p-2">Rs. ${p.price.toLocaleString()}</td>
                                    <td class="p-2 text-green-400">Rs. ${p.reseller_price.toLocaleString()}</td>
                                    <td class="p-2">${p.stock}</td>
                                    <td class="p-2"><button class="text-vezlo-blue hover:text-blue-400"><i class="fas fa-edit"></i></button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
            },

            dashOwnerSettings() {
                if (!this.isOwner()) return '<p class="text-red-500">Access Denied</p>';
                return `
                <h3 class="font-bold text-xl mb-6 text-red-500"><i class="fas fa-crown mr-2"></i>Owner Settings</h3>
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="bg-gray-800 p-6 rounded-xl border border-red-500/30">
                        <h4 class="font-bold mb-3">Website Lockdown</h4>
                        <p class="text-sm text-gray-400 mb-4">Shut down the entire website for maintenance. Only you (Owner) can access.</p>
                        <button onclick="alert('Feature active! Only Owner can toggle this.')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold text-sm transition">
                            <i class="fas fa-lock mr-1"></i> Enable Lockdown
                        </button>
                    </div>
                    <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                        <h4 class="font-bold mb-3">System Info</h4>
                        <div class="space-y-2 text-sm text-gray-400">
                            <p>Total Products: ${this.products.length}</p>
                            <p>Database: Connected</p>
                            <p>Hosting: Vercel</p>
                        </div>
                    </div>
                </div>`;
            }
        };

        // Start Application
        document.addEventListener('DOMContentLoaded', () => Vezlo.init());
    </script>
</body>
</html>
