<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Vezlo Mart - Sri Lanka's Smartest Marketplace">
    <meta property="og:description" content="Get the best retail deals with COD or join our Reseller Network to earn from home!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vezlomart.lk">
    <meta property="og:image" content="https://res.cloudinary.com/vezlo/image/upload/og-banner.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #06060B;
            --bg2: #0C0C14;
            --card: #111119;
            --card2: #16161F;
            --border: #1E1E2E;
            --fg: #E8E8F0;
            --fg2: #A0A0B8;
            --muted: #5A5A72;
            --blue: #2563EB;
            --blue2: #1D4ED8;
            --blue-glow: rgba(37,99,235,0.25);
            --red: #DC2626;
            --red2: #B91C1C;
            --red-glow: rgba(220,38,38,0.2);
            --green: #16A34A;
            --green-glow: rgba(22,163,74,0.2);
            --yellow: #EAB308;
            --yellow-glow: rgba(234,179,8,0.2);
            --sidebar-w: 260px;
        }
        [data-theme="light"] {
            --bg: #F0F2F5;
            --bg2: #E4E7EB;
            --card: #FFFFFF;
            --card2: #F8F9FB;
            --border: #D1D5DB;
            --fg: #111827;
            --fg2: #4B5563;
            --muted: #9CA3AF;
            --blue: #2563EB;
            --blue2: #1D4ED8;
            --blue-glow: rgba(37,99,235,0.15);
            --red: #DC2626;
            --red2: #B91C1C;
            --red-glow: rgba(220,38,38,0.1);
            --green: #16A34A;
            --green-glow: rgba(22,163,74,0.1);
            --yellow: #EAB308;
            --yellow-glow: rgba(234,179,8,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }
        h1,h2,h3,h4,h5,h6 { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background: var(--bg2); }
        ::-webkit-scrollbar-thumb { background: var(--blue); border-radius:3px; }
        a { color: var(--blue); text-decoration:none; }
        .btn {
            display:inline-flex; align-items:center; gap:8px;
            padding:10px 22px; border-radius:8px; font-weight:600;
            font-size:14px; cursor:pointer; border:none;
            transition: all 0.25s ease; font-family:'Poppins',sans-serif;
        }
        .btn-primary { background:var(--blue); color:#fff; }
        .btn-primary:hover { background:var(--blue2); box-shadow:0 0 20px var(--blue-glow); transform:translateY(-1px); }
        .btn-red { background:var(--red); color:#fff; }
        .btn-red:hover { background:var(--red2); box-shadow:0 0 20px var(--red-glow); }
        .btn-outline { background:transparent; color:var(--fg); border:1.5px solid var(--border); }
        .btn-outline:hover { border-color:var(--blue); color:var(--blue); }
        .btn-ghost { background:transparent; color:var(--fg2); }
        .btn-ghost:hover { color:var(--blue); background:var(--blue-glow); }
        .btn-sm { padding:6px 14px; font-size:12px; }
        .btn-lg { padding:14px 32px; font-size:16px; }
        .input-field {
            width:100%; padding:12px 16px; border-radius:8px;
            background:var(--bg2); border:1.5px solid var(--border);
            color:var(--fg); font-size:14px; font-family:'Poppins',sans-serif;
            transition:border-color 0.2s;
        }
        .input-field:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-glow); }
        .input-field::placeholder { color:var(--muted); }
        select.input-field { cursor:pointer; }
        .card {
            background:var(--card); border:1px solid var(--border);
            border-radius:12px; padding:20px;
            transition:all 0.3s ease;
        }
        .card:hover { border-color:rgba(37,99,235,0.3); }
        .badge {
            display:inline-flex; align-items:center; padding:3px 10px;
            border-radius:20px; font-size:11px; font-weight:600;
        }
        .badge-blue { background:var(--blue-glow); color:var(--blue); }
        .badge-red { background:var(--red-glow); color:var(--red); }
        .badge-green { background:var(--green-glow); color:var(--green); }
        .badge-yellow { background:var(--yellow-glow); color:var(--yellow); }
        /* Navigation */
        #main-nav {
            position:fixed; top:0; left:0; right:0; z-index:1000;
            background:rgba(6,6,11,0.85); backdrop-filter:blur(16px);
            border-bottom:1px solid var(--border);
            transition:background 0.3s;
        }
        [data-theme="light"] #main-nav { background:rgba(240,242,245,0.9); }
        .nav-inner {
            max-width:1280px; margin:0 auto; padding:0 20px;
            display:flex; align-items:center; justify-content:space-between;
            height:64px;
        }
        .nav-logo { display:flex; align-items:center; gap:10px; font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:22px; color:var(--fg); }
        .nav-logo span { color:var(--blue); }
        .nav-links { display:flex; align-items:center; gap:6px; }
        .nav-link {
            padding:8px 16px; border-radius:8px; font-size:14px;
            font-weight:500; color:var(--fg2); cursor:pointer;
            transition:all 0.2s; border:none; background:none;
            font-family:'Poppins',sans-serif;
        }
        .nav-link:hover, .nav-link.active { color:var(--blue); background:var(--blue-glow); }
        .mobile-menu-btn { display:none; background:none; border:none; color:var(--fg); font-size:22px; cursor:pointer; }
        /* Toast */
        #toast-container {
            position:fixed; top:80px; right:20px; z-index:9999;
            display:flex; flex-direction:column; gap:8px;
        }
        .toast {
            padding:14px 20px; border-radius:10px; min-width:280px;
            font-size:13px; font-weight:500; display:flex; align-items:center; gap:10px;
            animation:slideInRight 0.3s ease; box-shadow:0 8px 24px rgba(0,0,0,0.3);
        }
        .toast-success { background:#052e16; color:#4ade80; border:1px solid #166534; }
        .toast-error { background:#2a0a0a; color:#f87171; border:1px solid #7f1d1d; }
        .toast-info { background:#0a1628; color:#60a5fa; border:1px solid #1e3a5f; }
        [data-theme="light"] .toast-success { background:#dcfce7; color:#166534; border-color:#86efac; }
        [data-theme="light"] .toast-error { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
        [data-theme="light"] .toast-info { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
        @keyframes slideInRight { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes slideOut { from{transform:translateX(0);opacity:1} to{transform:translateX(100%);opacity:0} }
        /* Modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.7);
            backdrop-filter:blur(4px); z-index:5000;
            display:flex; align-items:center; justify-content:center;
            padding:20px; animation:fadeIn 0.2s;
        }
        .modal-box {
            background:var(--card); border:1px solid var(--border);
            border-radius:16px; padding:28px; max-width:520px; width:100%;
            max-height:90vh; overflow-y:auto; animation:scaleIn 0.25s ease;
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes scaleIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
        /* Dashboard Layout */
        .dash-layout { display:flex; min-height:100vh; padding-top:64px; }
        .dash-sidebar {
            width:var(--sidebar-w); background:var(--card);
            border-right:1px solid var(--border); padding:20px 0;
            position:fixed; top:64px; bottom:0; left:0;
            overflow-y:auto; z-index:100;
            transition:transform 0.3s;
        }
        .dash-sidebar.collapsed { transform:translateX(-100%); }
        .dash-main { flex:1; margin-left:var(--sidebar-w); padding:24px; min-height:calc(100vh - 64px); }
        .sidebar-section { padding:0 16px; margin-bottom:20px; }
        .sidebar-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; padding:8px 12px; }
        .sidebar-link {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; border-radius:8px; font-size:13px;
            font-weight:500; color:var(--fg2); cursor:pointer;
            transition:all 0.2s; border:none; background:none;
            width:100%; text-align:left; font-family:'Poppins',sans-serif;
        }
        .sidebar-link:hover { color:var(--fg); background:var(--bg2); }
        .sidebar-link.active { color:var(--blue); background:var(--blue-glow); }
        .sidebar-link i { width:18px; text-align:center; }
        /* Stats Cards */
        .stat-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:12px; padding:20px;
            display:flex; align-items:flex-start; justify-content:space-between;
        }
        .stat-icon {
            width:44px; height:44px; border-radius:10px;
            display:flex; align-items:center; justify-content:center;
            font-size:18px;
        }
        /* Product Card */
        .product-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:12px; overflow:hidden;
            transition:all 0.3s ease; cursor:pointer;
        }
        .product-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.3); border-color:var(--blue); }
        .product-card img { width:100%; height:200px; object-fit:cover; }
        .product-card .p-info { padding:14px; }
        .product-card .p-name { font-weight:600; font-size:14px; margin-bottom:6px; color:var(--fg); }
        .product-card .p-price { font-weight:700; font-size:18px; color:var(--blue); }
        .product-card .p-price .p-original { font-size:13px; color:var(--muted); text-decoration:line-through; font-weight:400; margin-left:6px; }
        .product-card .p-discount-tag {
            position:absolute; top:10px; left:10px;
            background:var(--red); color:#fff; padding:3px 10px;
            border-radius:6px; font-size:11px; font-weight:700;
        }
        /* Table */
        .data-table { width:100%; border-collapse:separate; border-spacing:0; }
        .data-table th {
            text-align:left; padding:12px 16px; font-size:11px;
            font-weight:600; color:var(--muted); text-transform:uppercase;
            letter-spacing:0.5px; border-bottom:1px solid var(--border);
            background:var(--card);
        }
        .data-table td {
            padding:12px 16px; font-size:13px; border-bottom:1px solid var(--border);
            color:var(--fg2);
        }
        .data-table tr:hover td { background:var(--bg2); }
        /* Hero */
        .hero-bg {
            position:relative; overflow:hidden;
            background:linear-gradient(135deg, #06060B 0%, #0a0f1e 50%, #0d0a1a 100%);
        }
        .hero-bg::before {
            content:''; position:absolute; top:-50%; right:-20%;
            width:600px; height:600px; border-radius:50%;
            background:radial-gradient(circle, var(--blue-glow) 0%, transparent 70%);
            filter:blur(60px);
        }
        .hero-bg::after {
            content:''; position:absolute; bottom:-30%; left:-10%;
            width:400px; height:400px; border-radius:50%;
            background:radial-gradient(circle, var(--red-glow) 0%, transparent 70%);
            filter:blur(50px);
        }
        /* Tabs */
        .tab-bar { display:flex; gap:4px; background:var(--bg2); padding:4px; border-radius:10px; margin-bottom:20px; overflow-x:auto; }
        .tab-btn {
            padding:8px 18px; border-radius:8px; font-size:13px;
            font-weight:500; color:var(--fg2); cursor:pointer;
            border:none; background:none; font-family:'Poppins',sans-serif;
            white-space:nowrap; transition:all 0.2s;
        }
        .tab-btn.active { background:var(--blue); color:#fff; }
        .tab-btn:hover:not(.active) { color:var(--fg); }
        /* Animations */
        .fade-in { animation:fadeIn 0.4s ease; }
        .slide-up { animation:slideUp 0.4s ease; }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
        /* Lockdown overlay */
        #lockdown-overlay {
            position:fixed; inset:0; z-index:99999;
            background:var(--bg); display:none;
            align-items:center; justify-content:center;
            flex-direction:column; gap:20px;
        }
        #lockdown-overlay.active { display:flex; }
        /* Search */
        .search-box {
            position:relative; display:flex; align-items:center;
        }
        .search-box input {
            padding:8px 14px 8px 36px; border-radius:8px;
            background:var(--bg2); border:1px solid var(--border);
            color:var(--fg); font-size:13px; width:220px;
            font-family:'Poppins',sans-serif;
        }
        .search-box i { position:absolute; left:12px; color:var(--muted); font-size:13px; }
        /* Responsive */
        @media(max-width:1024px) {
            .dash-sidebar { transform:translateX(-100%); }
            .dash-sidebar.open { transform:translateX(0); }
            .dash-main { margin-left:0; }
            .mobile-menu-btn { display:block; }
        }
        @media(max-width:768px) {
            .nav-links { display:none; }
            .nav-links.open { display:flex; flex-direction:column; position:absolute; top:64px; left:0; right:0; background:var(--card); border-bottom:1px solid var(--border); padding:12px; gap:4px; }
            .search-box input { width:140px; }
            .hero-title { font-size:32px !important; }
        }
        @media(max-width:480px) {
            .stat-card { padding:14px; }
            .btn { padding:8px 16px; font-size:13px; }
        }
        /* Floating particles */
        .particle {
            position:absolute; border-radius:50%; pointer-events:none;
            animation:float 8s infinite ease-in-out;
        }
        @keyframes float {
            0%,100% { transform:translateY(0) scale(1); opacity:0.3; }
            50% { transform:translateY(-30px) scale(1.2); opacity:0.6; }
        }
        /* Rating stars */
        .star { color:var(--muted); cursor:pointer; transition:color 0.15s; }
        .star.filled { color:var(--yellow); }
        .star:hover { color:var(--yellow); }
        /* Progress bar */
        .progress-bar { height:6px; background:var(--bg2); border-radius:3px; overflow:hidden; }
        .progress-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }
        /* Skeleton */
        .skeleton { background:linear-gradient(90deg,var(--bg2) 25%,var(--card) 50%,var(--bg2) 75%); background-size:200% 100%; animation:skeleton 1.5s infinite; border-radius:6px; }
        @keyframes skeleton { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        /* Chart container */
        .chart-container { position:relative; height:280px; }
    </style>
</head>
<body>
    <!-- Lockdown Overlay -->
    <div id="lockdown-overlay">
        <i class="fas fa-lock" style="font-size:64px;color:var(--red);"></i>
        <h2 style="font-size:28px;font-weight:800;color:var(--fg);">Website Temporarily Closed</h2>
        <p style="color:var(--fg2);max-width:400px;text-align:center;">Vezlo Mart is currently under maintenance. We'll be back soon. Thank you for your patience!</p>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Main Navigation -->
    <nav id="main-nav">
        <div class="nav-inner">
            <div class="nav-logo" onclick="App.router.go('home')" style="cursor:pointer;">
                <i class="fas fa-bolt" style="color:var(--blue);"></i>
                Vezlo<span>Mart</span>
            </div>
            <div class="nav-links" id="nav-links">
                <button class="nav-link" onclick="App.router.go('home')">Home</button>
                <button class="nav-link" onclick="App.router.go('products')">Products</button>
                <button class="nav-link" id="nav-dashboard-btn" style="display:none;" onclick="App.router.go('dashboard')">Dashboard</button>
                <button class="nav-link" id="nav-cart-btn" onclick="App.router.go('cart')"><i class="fas fa-shopping-cart"></i> Cart</button>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="search-box" style="display:none;" id="nav-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search products..." id="global-search" onkeyup="App.utils.handleSearch(event)">
                </div>
                <button onclick="App.ui.toggleTheme()" class="btn-ghost" style="padding:8px;border-radius:8px;border:none;cursor:pointer;background:none;color:var(--fg);font-size:16px;">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
                <button class="btn btn-primary btn-sm" id="nav-login-btn" onclick="App.router.go('auth')">Login</button>
                <div id="nav-user-menu" style="display:none;position:relative;">
                    <button onclick="App.ui.toggleUserMenu()" style="display:flex;align-items:center;gap:8px;background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;color:var(--fg);font-family:'Poppins',sans-serif;">
                        <div style="width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;" id="nav-avatar">U</div>
                        <span style="font-size:13px;font-weight:500;" id="nav-username">User</span>
                        <i class="fas fa-chevron-down" style="font-size:10px;color:var(--muted);"></i>
                    </button>
                    <div id="user-dropdown" style="display:none;position:absolute;top:48px;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:180px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.3);">
                        <button class="sidebar-link" onclick="App.router.go('dashboard');App.ui.closeUserMenu()"><i class="fas fa-tachometer-alt"></i> Dashboard</button>
                        <button class="sidebar-link" onclick="App.router.go('profile');App.ui.closeUserMenu()"><i class="fas fa-user"></i> Profile</button>
                        <button class="sidebar-link" onclick="App.router.go('cart');App.ui.closeUserMenu()"><i class="fas fa-shopping-cart"></i> Cart</button>
                        <hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">
                        <button class="sidebar-link" style="color:var(--red);" onclick="App.auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>
                <button class="mobile-menu-btn" onclick="App.ui.toggleMobileNav()"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main id="app-content"></main>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <script>
    /* ========================================
       VEZLO MART - Complete SPA
       ======================================== */

    const App = {
        // ── Configuration ──
        config: {
            supabaseUrl: 'YOUR_SUPABASE_URL', // Replace with your Supabase URL
            supabaseKey: 'YOUR_SUPABASE_ANON_KEY', // Replace with your Supabase anon key
            cloudinaryCloud: 'YOUR_CLOUDINARY_CLOUD', // Replace with Cloudinary cloud name
            cloudinaryPreset: 'YOUR_UPLOAD_PRESET', // Replace with unsigned upload preset
            whatsapp: '94775048455', // WhatsApp number with country code
            email: 'chat.dmkaawya@gmail.com',
            phone: '0775048455',
            resellerDiscount: 25, // Default reseller discount percentage
            pointsPerOrder: 10, // Points earned per order
            deliveryFee: 250, // Default delivery fee LKR
        },

        // ── Application State ──
        state: {
            currentUser: null,
            userRole: 'guest', // guest, customer, reseller, staff, manager, owner
            resellerApproved: false,
            currentView: 'home',
            dashboardTab: 'overview',
            products: [],
            cart: [],
            orders: [],
            users: [],
            reviews: [],
            coupons: [],
            lockdown: false,
            theme: localStorage.getItem('vezlo-theme') || 'dark',
            searchQuery: '',
        },

        supabase: null,

        // ── Initialize App ──
        async init() {
            // Set theme
            document.documentElement.setAttribute('data-theme', this.state.theme);
            this.updateThemeIcon();

            // Init Supabase
            if (this.config.supabaseUrl !== 'YOUR_SUPABASE_URL') {
                this.supabase = supabase.createClient(this.config.supabaseUrl, this.config.supabaseKey);
                this.auth.listenAuth();
            }

            // Load demo data
            this.loadDemoData();

            // Check lockdown
            const isLocked = localStorage.getItem('vezlo-lockdown') === 'true';
            if (isLocked && this.state.userRole !== 'owner') {
                document.getElementById('lockdown-overlay').classList.add('active');
                this.state.lockdown = true;
            }

            // Router
            this.router.init();

            // Nav search
            document.getElementById('nav-search').style.display = 'flex';

            // Render
            this.render();
        },

        // ── Demo Data ──
        loadDemoData() {

                if (role === 'reseller') return this.resellerDashboard();
                if (role === 'staff') return this.staffDashboard();

                if (role === 'owner') return this.ownerDashboard();
                return '';
            },

                return `
                <div class="dash-layout">
                    ${App.utils.dashboardSidebar('customer')}
                    <div class="dash-main">

        // ══════════════════════════════════
        //  UTILITIES
        // ══════════════════════════════════

        utils: {
            productCard(p) {
                const isReseller = App.state.userRole === 'reseller' && App.state.resellerApproved;
                const displayPrice = isReseller ? p.resellerPrice : p.price;
                const discount = Math.round(((p.price - p.resellerPrice) / p.price) * 100);
                return `
                <div class="product-card" style="position:relative;" onclick="App.state.selectedProduct=${p.id};App.router.go('product-detail')">
                    ${isReseller && discount > 0 ? `<div class="p-discount-tag">${discount}% OFF</div>` : ''}
                    <img src="${p.image}" alt="${p.name}" loading="lazy">
                    <div class="p-info">
                        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">${p.category}</div>
                        <div class="p-name">${p.name}</div>
                        <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px;">
                            <div style="display:flex;gap:1px;">${App.utils.starDisplay(p.rating)}</div>
                            <span style="font-size:11px;color:var(--muted);">(${p.reviews})</span>
                        </div>
                        <div class="p-price">Rs. ${displayPrice.toLocaleString()}${isReseller ? `<span class="p-original">Rs. ${p.price.toLocaleString()}</span>` : ''}</div>
                    </div>
                </div>`;
            },

            starDisplay(rating) {
                let stars = '';
                for (let i = 1; i <= 5; i++) {
                    if (i <= Math.floor(rating)) stars += '<i class="fas fa-star" style="color:var(--yellow);font-size:11px;"></i>';
                    else if (i - 0.5 <= rating) stars += '<i class="fas fa-star-half-alt" style="color:var(--yellow);font-size:11px;"></i>';
                    else stars += '<i class="far fa-star" style="color:var(--muted);font-size:11px;"></i>';
                }
                return stars;
            },

            dashboardSidebar(role) {
                const user = App.state.currentUser;
                const menus = {
                    customer: [
                        { label:'Overview', icon:'fa-tachometer-alt', view:'overview' },
                        { label:'My Orders', icon:'fa-shopping-bag', view:'orders' },
                        { label:'My Reviews', icon:'fa-star', view:'reviews' },
                    ],
                    reseller: [
                        { label:'Dashboard', icon:'fa-tachometer-alt', view:'overview' },
                        { label:'Products', icon:'fa-box', action:()=>App.router.go('products') },
                        { label:'My Orders', icon:'fa-shopping-bag', view:'orders' },
                        { label:'My Customers', icon:'fa-users', view:'customers' },
                        { label:'Profile', icon:'fa-user', action:()=>App.router.go('profile') },
                    ],
                    staff: [
                        { label:'Products', icon:'fa-box', view:'products' },
                        { label:'Resellers', icon:'fa-users', view:'resellers' },
                        { label:'Reviews', icon:'fa-star', view:'reviews' },
                        { label:'Orders', icon:'fa-shopping-bag', view:'orders' },
                    ],
                    manager: [
                        { label:'Analytics', icon:'fa-chart-bar', view:'analytics' },
                        { label:'Products', icon:'fa-box', view:'products' },
                        { label:'Resellers', icon:'fa-users', view:'resellers' },
                        { label:'Reviews', icon:'fa-star', view:'reviews' },
                        { label:'Orders', icon:'fa-shopping-bag', view:'orders' },
                        { label:'Staff', icon:'fa-user-tie', view:'staff' },
                    ],
                    owner: [
                        { label:'Analytics', icon:'fa-chart-bar', view:'analytics' },
                        { label:'Products', icon:'fa-box', view:'products' },
                        { label:'Resellers', icon:'fa-users', view:'resellers' },
                        { label:'Reviews', icon:'fa-star', view:'reviews' },
                        { label:'Orders', icon:'fa-shopping-bag', view:'orders' },
                        { label:'Staff', icon:'fa-user-tie', view:'staff' },
                        { label:'Settings', icon:'fa-cog', view:'settings' },
                    ],
                };
                const items = menus[role] || [];
                return `
                <div class="dash-sidebar" id="dash-sidebar">
                    <div style="padding:16px;margin-bottom:12px;border-bottom:1px solid var(--border);">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;">${user?.name?user.name[0].toUpperCase():'U'}</div>
                            <div><div style="font-weight:600;font-size:13px;">${user?.name||'User'}</div><div class="badge ${role==='owner'?'badge-red':role==='manager'?'badge-yellow':role==='reseller'?'badge-green':'badge-blue'}" style="font-size:10px;">${role}</div></div>
                        </div>
                    </div>
                    <div class="sidebar-section">
                        <div class="sidebar-label">Navigation</div>
                        <button class="sidebar-link" onclick="App.router.go('home')"><i class="fas fa-home"></i> Home</button>
                        <button class="sidebar-link" onclick="App.router.go('products')"><i class="fas fa-shopping-bag"></i> Products</button>
                    </div>
                    <div class="sidebar-section">
                        <div class="sidebar-label">Dashboard</div>
                        ${items.map(m => `<button class="sidebar-link ${App.state.dashboardTab===m.view?'active':''}" onclick="${m.action?`(${m.action.toString()})()`:`App.state.dashboardTab='${m.view}';App.render()`}"><i class="fas ${m.icon}"></i> ${m.label}</button>`).join('')}
                    </div>
                    <div class="sidebar-section" style="margin-top:auto;border-top:1px solid var(--border);padding-top:12px;">
                        <button class="sidebar-link" onclick="App.router.go('profile')"><i class="fas fa-user"></i> Profile</button>
                        <button class="sidebar-link" style="color:var(--red);" onclick="App.auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>`;
            },

            addToCart(productId) {
                const product = App.state.products.find(p => p.id === productId);
                if (!product) return;
                const existing = App.state.cart.find(item => item.id === productId);
                if (existing) {
                    existing.qty++;
                } else {
                    App.state.cart.push({ ...product, qty: 1 });
                }
                App.ui.toast('Added to cart!', 'success');
                App.render();
            },

            updateCartQty(index, delta) {
                App.state.cart[index].qty += delta;
                if (App.state.cart[index].qty <= 0) App.state.cart.splice(index, 1);
                App.render();
            },

            removeFromCart(index) {
                App.state.cart.splice(index, 1);
                App.render();
            },

            applyCoupon() {
                const code = document.getElementById('coupon-input')?.value?.trim().toUpperCase();
                const coupon = App.state.coupons.find(c => c.code === code);
                if (coupon) {
                    App.ui.toast(`Coupon applied! ${coupon.discount}% discount`, 'success');
                } else {
                    App.ui.toast('Invalid coupon code', 'error');
                }
            },

            orderWhatsApp(productId) {
                const p = App.state.products.find(pr => pr.id === productId);
                if (!p) return;
                const isReseller = App.state.userRole === 'reseller' && App.state.resellerApproved;
                const price = isReseller ? p.resellerPrice : p.price;
                const user = App.state.currentUser;
                let msg = `Hi Vezlo Mart! I'd like to order:\n\n`;
                msg += `*${p.name}*\n`;
                msg += `Price: Rs. ${price.toLocaleString()}\n`;
                msg += `Delivery: Rs. ${App.config.deliveryFee}\n`;
                msg += `Total: Rs. ${(price + App.config.deliveryFee).toLocaleString()}\n\n`;
                if (user) {
                    msg += `Name: ${user.name}\n`;
                    msg += `Phone: ${user.phone || 'N/A'}\n`;
                    msg += `Address: ${user.address || 'N/A'}`;
                } else {
                    msg += `Please provide your name, phone, and delivery address.`;
